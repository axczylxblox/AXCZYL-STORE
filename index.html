<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXCZYL STORE | PPOB</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ff007f; --bg: #030303; --border: rgba(255, 255, 255, 0.08); --text: #fff; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans'; margin: 0; }
        header { padding: 20px 7%; display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .logo span { color: var(--primary); }
        section { display: none; padding: 40px 7%; animation: fadeIn 0.5s; }
        section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .btn-order { background: var(--primary); color: #fff; border: none; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; font-weight: 800; }
        .card { background: #0a0a0a; border: 1px solid var(--border); padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        input { width: 100%; padding: 15px; background: #111; border: 1px solid var(--border); color: #fff; border-radius: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

<header>
    <div class="logo" onclick="showPage('home')">AXCZYL<span>STORE</span></div>
    <div id="authStatus">
        <button onclick="showPage('login-page')" style="background:none; color:var(--primary); border:none; font-weight:800; cursor:pointer;">LOGIN</button>
    </div>
</header>

<section id="home" class="active">
    <div class="card" id="userInfo" style="display:none;">
        <h3 id="userHello">Halo, User!</h3>
        <p>Saldo: <span id="balanceText" style="color:var(--primary);">Rp 0</span></p>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <button onclick="showPage('deposit-page')" style="flex:1; padding:5px; border-radius:5px; border:1px solid var(--primary); background:none; color:#fff;">Topup</button>
            <button onclick="showPage('history-page')" style="flex:1; padding:5px; border-radius:5px; border:1px solid var(--primary); background:none; color:#fff;">Riwayat</button>
        </div>
    </div>
    
    <h2>Layanan <span>Unggulan</span></h2>
    <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:20px; margin-top:20px;">
        <div class="card" onclick="order('Web PPOB', 150000)">
            <i class="fas fa-globe" style="font-size:2rem; color:var(--primary);"></i>
            <h3>Web PPOB</h3>
            <p>Rp 150.000</p>
        </div>
        </div>
</section>

<section id="login-page">
    <div class="card" style="max-width:400px; margin:auto;">
        <h3>USER LOGIN</h3>
        <input type="text" id="l_user" placeholder="Username">
        <input type="password" id="l_pass" placeholder="Password">
        <button class="btn-order" onclick="login()">MASUK</button>
    </div>
</section>

<section id="history-page">
    <button onclick="showPage('home')" class="btn-order" style="width:auto; margin-bottom:20px;">KEMBALI</button>
    <h3>Riwayat Transaksi</h3>
    <div id="historyList"></div>
</section>

<section id="admin-page">
    <h2>ADMIN PANEL</h2>
    <div class="card">
        <h3>Total Penjualan: Rp <span id="totalSales">0</span></h3>
    </div>
</section>

<script>
    let userData = null;

    function showPage(id) {
        document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    async function login() {
        const username = document.getElementById('l_user').value;
        const password = document.getElementById('l_pass').value;
        
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username, password })
        });
        
        const data = await res.json();
        if(data.success) {
            userData = data.user;
            document.getElementById('authStatus').innerHTML = `<span style="color:var(--primary)">${userData.username}</span>`;
            document.getElementById('userInfo').style.display = 'block';
            document.getElementById('userHello').innerText = `Halo, ${userData.username}!`;
            document.getElementById('balanceText').innerText = `Rp ${userData.balance.toLocaleString()}`;
            
            if(userData.role === 'admin') showPage('admin-page');
            else showPage('home');
        } else {
            alert(data.message);
        }
    }

    async function order(product, price) {
        if(!userData) return showPage('login-page');
        
        const res = await fetch('/api/order', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ username: userData.username, product, price })
        });
        
        const data = await res.json();
        if(data.success) {
            alert('Pembelian Berhasil!');
            userData.balance = data.balance;
            document.getElementById('balanceText').innerText = `Rp ${data.balance.toLocaleString()}`;
        } else {
            alert(data.message);
        }
    }
</script>
</body>
</html>
